<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Popopen stacked skills icon">
  <defs>
    <linearGradient id="ss-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
  </defs>

  <!-- back card -->
  <rect x="26" y="34" width="68" height="72" rx="12" fill="#1C1C1E" opacity="0.18"/>
  <!-- middle card -->
  <rect x="22" y="40" width="68" height="72" rx="12" fill="#1C1C1E" opacity="0.32"/>
  <!-- top card, rotated/popped -->
  <g transform="translate(56 42) rotate(-10) translate(-56 -42)">
    <rect x="22" y="6" width="68" height="72" rx="12" fill="url(#ss-grad)"/>
    <!-- markdown lines -->
    <rect x="32" y="20" width="40" height="4" rx="2" fill="#FFFFFF" opacity="0.95"/>
    <rect x="32" y="32" width="48" height="3" rx="1.5" fill="#FFFFFF" opacity="0.55"/>
    <rect x="32" y="40" width="44" height="3" rx="1.5" fill="#FFFFFF" opacity="0.55"/>
    <rect x="32" y="48" width="36" height="3" rx="1.5" fill="#FFFFFF" opacity="0.55"/>
  </g>
</svg>
