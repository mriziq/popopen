<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Popopen window pop icon">
  <defs>
    <linearGradient id="wp-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
  </defs>

  <!-- window -->
  <rect x="14" y="32" width="92" height="74" rx="14" fill="#F2F2F7" stroke="#1C1C1E" stroke-opacity="0.08" stroke-width="1"/>

  <!-- title bar -->
  <path d="M14 46 a14 14 0 0 1 14 -14 h64 a14 14 0 0 1 14 14 v0 h-92z" fill="url(#wp-grad)"/>

  <!-- traffic lights (subtle) -->
  <circle cx="26" cy="39" r="3" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="36" cy="39" r="3" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="46" cy="39" r="3" fill="#FFFFFF" opacity="0.55"/>

  <!-- popping chevron rising -->
  <path d="M48 80 L60 64 L72 80" fill="none" stroke="url(#wp-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M48 96 L60 80 L72 96" fill="none" stroke="url(#wp-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
</svg>
