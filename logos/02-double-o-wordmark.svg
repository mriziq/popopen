<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" width="360" height="96" role="img" aria-label="Popopen wordmark">
  <defs>
    <linearGradient id="doo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
  </defs>

  <!-- p -->
  <text x="0" y="68" font-family="-apple-system, SF Pro Display, Inter, Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#1C1C1E" letter-spacing="-2.5">p</text>

  <!-- first o: solid window -->
  <g transform="translate(40 26)">
    <rect x="0" y="0" width="48" height="48" rx="24" fill="url(#doo-grad)"/>
    <rect x="10" y="10" width="28" height="28" rx="14" fill="#F2F2F7"/>
  </g>

  <!-- p -->
  <text x="92" y="68" font-family="-apple-system, SF Pro Display, Inter, Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#1C1C1E" letter-spacing="-2.5">p</text>

  <!-- second o: popped open (lid lifted) -->
  <g transform="translate(132 26)">
    <!-- body -->
    <path d="M0 24 a24 24 0 0 0 48 0 v0 h-48z" fill="url(#doo-grad)"/>
    <path d="M10 24 a14 14 0 0 0 28 0 v0 h-28z" fill="#F2F2F7"/>
    <!-- lifted top half -->
    <g transform="translate(24 18) rotate(-12) translate(-24 -18)">
      <path d="M0 24 a24 24 0 0 1 48 0 v0 h-48z" fill="url(#doo-grad)"/>
    </g>
    <!-- spark -->
    <circle cx="44" cy="2" r="3.5" fill="#FF9F0A"/>
  </g>

  <!-- pen -->
  <text x="184" y="68" font-family="-apple-system, SF Pro Display, Inter, Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#1C1C1E" letter-spacing="-2.5">pen</text>
</svg>
