<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 140" width="160" height="140" role="img" aria-label="Popopen front view with popped hood">
  <defs>
    <linearGradient id="fg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48484A"/>
      <stop offset="100%" stop-color="#1C1C1E"/>
    </linearGradient>
    <linearGradient id="fg-hood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#5E5CE6"/>
    </linearGradient>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="80" cy="128" rx="62" ry="5" fill="#1C1C1E" opacity="0.22"/>

  <!-- car front (trapezoid) -->
  <path d="
    M22 122
    L22 88
    Q22 78 32 78
    L128 78
    Q138 78 138 88
    L138 122
    Z"
    fill="url(#fg-grad)"/>

  <!-- bumper -->
  <rect x="22" y="116" width="116" height="8" rx="3" fill="#1C1C1E"/>

  <!-- grille -->
  <rect x="46" y="92" width="68" height="18" rx="3" fill="#0C0C0E"/>
  <line x1="48" y1="98" x2="112" y2="98" stroke="#48484A" stroke-width="1"/>
  <line x1="48" y1="104" x2="112" y2="104" stroke="#48484A" stroke-width="1"/>

  <!-- headlights -->
  <path d="M22 88 Q22 80 32 80 L42 80 L42 96 L22 96 Z" fill="#FFD60A"/>
  <path d="M138 88 Q138 80 128 80 L118 80 L118 96 L138 96 Z" fill="#FFD60A"/>

  <!-- popped hood (rises behind, tilted in perspective) -->
  <path d="
    M30 76
    L130 76
    L116 22
    L44 22
    Z"
    fill="url(#fg-hood)"/>

  <!-- hood seam -->
  <line x1="80" y1="76" x2="80" y2="22" stroke="#1C1C1E" stroke-width="1.5" opacity="0.35"/>

  <!-- spark above -->
  <g transform="translate(80 12)">
    <path d="M0 -8 L2 -2 L8 0 L2 2 L0 8 L-2 2 L-8 0 L-2 -2 Z" fill="#FF9F0A"/>
  </g>

  <!-- prop rod -->
  <line x1="50" y1="78" x2="60" y2="30" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"/>
</svg>
