<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Popopen lid pop icon">
  <defs>
    <linearGradient id="lp-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
    <radialGradient id="lp-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Container body -->
  <rect x="18" y="44" width="84" height="60" rx="16" fill="url(#lp-grad)"/>

  <!-- Inner glow (skill peeking out) -->
  <ellipse cx="60" cy="46" rx="34" ry="8" fill="url(#lp-glow)"/>

  <!-- Lifted lid -->
  <g transform="translate(60 38) rotate(-8) translate(-60 -38)">
    <rect x="22" y="30" width="76" height="16" rx="8" fill="#1C1C1E"/>
    <rect x="22" y="30" width="76" height="16" rx="8" fill="url(#lp-grad)" opacity="0.85"/>
  </g>

  <!-- Pop dot -->
  <circle cx="92" cy="22" r="4" fill="#FF9F0A"/>
</svg>
