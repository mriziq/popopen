<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 120" width="140" height="120" role="img" aria-label="Popopen hood and engine mark">
  <defs>
    <linearGradient id="he-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#5E5CE6"/>
    </linearGradient>
  </defs>

  <!-- engine block base -->
  <rect x="22" y="62" width="96" height="44" rx="8" fill="#1C1C1E"/>

  <!-- cylinders -->
  <rect x="32" y="72" width="20" height="26" rx="3" fill="#3A3A3C"/>
  <rect x="58" y="72" width="20" height="26" rx="3" fill="#3A3A3C"/>
  <rect x="84" y="72" width="20" height="26" rx="3" fill="#3A3A3C"/>

  <!-- spark plugs -->
  <circle cx="42" cy="78" r="2.5" fill="#FF9F0A"/>
  <circle cx="68" cy="78" r="2.5" fill="#FF9F0A"/>
  <circle cx="94" cy="78" r="2.5" fill="#FF9F0A"/>

  <!-- popped hood (curved, angled up) -->
  <path d="
    M12 56
    Q14 30 36 22
    L96 8
    Q116 6 124 14"
    fill="none" stroke="url(#he-grad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- hood underside hint -->
  <path d="
    M18 56
    Q20 36 38 30
    L94 18"
    fill="none" stroke="#1C1C1E" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <!-- hood prop rod -->
  <line x1="40" y1="56" x2="62" y2="22" stroke="#1C1C1E" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
