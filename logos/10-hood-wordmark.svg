<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 120" width="380" height="120" role="img" aria-label="Popopen hood wordmark">
  <defs>
    <linearGradient id="hwm-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#5E5CE6"/>
    </linearGradient>
  </defs>

  <!-- mini icon: side view car with hood popped -->
  <g transform="translate(8 24)">
    <!-- body -->
    <path d="
      M10 56
      L10 44
      Q10 36 18 36
      L36 36
      Q42 22 56 20
      L86 20
      Q96 20 102 30
      L110 36
      Q120 38 122 44
      L122 56
      Z"
      fill="#1C1C1E"/>
    <!-- engine block -->
    <rect x="12" y="40" width="22" height="14" rx="2" fill="#48484A"/>
    <!-- popped hood -->
    <g transform="translate(30 36) rotate(-55) translate(-30 -36)">
      <path d="M14 36 L14 30 Q14 24 22 24 L46 24 Q52 30 54 36 Z"
        fill="url(#hwm-grad)"/>
    </g>
    <!-- wheels -->
    <circle cx="34" cy="62" r="9" fill="#1C1C1E"/>
    <circle cx="34" cy="62" r="4" fill="#8E8E93"/>
    <circle cx="104" cy="62" r="9" fill="#1C1C1E"/>
    <circle cx="104" cy="62" r="4" fill="#8E8E93"/>
    <!-- spark -->
    <circle cx="18" cy="14" r="3" fill="#FF9F0A"/>
  </g>

  <!-- wordmark -->
  <text x="148" y="80" font-family="-apple-system, SF Pro Display, Inter, Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="#1C1C1E" letter-spacing="-2">popopen</text>
</svg>
