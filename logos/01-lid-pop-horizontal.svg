<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" width="320" height="96" role="img" aria-label="Popopen logo horizontal">
  <defs>
    <linearGradient id="lph-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g transform="translate(8 8) scale(0.66)">
    <rect x="18" y="44" width="84" height="60" rx="16" fill="url(#lph-grad)"/>
    <g transform="translate(60 38) rotate(-8) translate(-60 -38)">
      <rect x="22" y="30" width="76" height="16" rx="8" fill="url(#lph-grad)"/>
    </g>
    <circle cx="92" cy="22" r="4" fill="#FF9F0A"/>
  </g>

  <!-- Wordmark -->
  <text x="100" y="62" font-family="-apple-system, SF Pro Display, Inter, Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#1C1C1E" letter-spacing="-1.5">popopen</text>
</svg>
