<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Popopen folder tab icon">
  <defs>
    <linearGradient id="ft-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
  </defs>

  <!-- folder body -->
  <rect x="14" y="40" width="92" height="66" rx="14" fill="url(#ft-grad)"/>

  <!-- inner shadow line -->
  <rect x="14" y="40" width="92" height="6" rx="3" fill="#1C1C1E" opacity="0.15"/>

  <!-- floating tab -->
  <rect x="22" y="18" width="44" height="16" rx="8" fill="url(#ft-grad)"/>

  <!-- pop spark -->
  <g transform="translate(80 22)">
    <circle r="5" fill="#FF9F0A"/>
    <circle r="9" fill="none" stroke="#FF9F0A" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>
