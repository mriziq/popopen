<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140" role="img" aria-label="Popopen popped hood with wrench">
  <defs>
    <linearGradient id="hw-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#5E5CE6"/>
    </linearGradient>
  </defs>

  <!-- car nose / fender base -->
  <path d="
    M12 100
    Q12 84 28 82
    L112 82
    Q128 84 128 100
    L128 116
    Q128 122 122 122
    L18 122
    Q12 122 12 116 Z"
    fill="url(#hw-grad)"/>

  <!-- grille -->
  <rect x="48" y="104" width="44" height="10" rx="2" fill="#1C1C1E" opacity="0.55"/>

  <!-- headlights -->
  <circle cx="26" cy="108" r="4" fill="#FFD60A"/>
  <circle cx="114" cy="108" r="4" fill="#FFD60A"/>

  <!-- engine bay opening -->
  <rect x="34" y="74" width="72" height="14" rx="2" fill="#1C1C1E"/>

  <!-- popped hood -->
  <g transform="translate(70 60) rotate(-22) translate(-70 -60)">
    <path d="
      M28 56
      Q28 44 40 42
      L100 42
      Q112 44 112 56
      L112 64
      Q112 68 108 68
      L32 68
      Q28 68 28 64 Z"
      fill="url(#hw-grad)" opacity="0.92"/>
    <line x1="34" y1="56" x2="106" y2="56" stroke="#1C1C1E" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- wrench inside engine bay (the "skill") -->
  <g transform="translate(70 78) rotate(-30)">
    <path d="
      M-4 -14
      a8 8 0 1 1 -2 14
      L-2 14
      a3 3 0 0 1 -6 0
      L-10 0
      a8 8 0 0 1 6 -14 Z"
      fill="#FF9F0A"/>
    <circle cx="-4" cy="-12" r="3" fill="#1C1C1E"/>
  </g>
</svg>
