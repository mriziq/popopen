<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popopen</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/markdown.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/atom-one-dark.min.css" id="hljs-theme">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shepherd.js/dist/css/shepherd.css">
</head>
<body>

  <!-- INTRO ANIMATION -->
  <div id="intro-overlay">
    <div class="intro-scene">
      <div class="head-wrapper">
        <div class="robot-head">
          <!-- Front face -->
          <div class="head-face head-front">
            <div class="face-plate">
              <div class="eye left-eye">
                <div class="eye-ring"></div>
                <div class="eye-pupil"></div>
              </div>
              <div class="eye right-eye">
                <div class="eye-ring"></div>
                <div class="eye-pupil"></div>
              </div>
              <div class="mouth-slit"></div>
            </div>
          </div>
          <!-- Back face (the panel) -->
          <div class="head-face head-back">
            <div class="back-panel">
              <div class="panel-screws">
                <span class="screw"></span>
                <span class="screw"></span>
                <span class="screw"></span>
                <span class="screw"></span>
              </div>
              <div class="panel-label">SK-J /// NEURAL ACCESS</div>
              <div class="panel-circuits">
                <div class="circuit c1"></div>
                <div class="circuit c2"></div>
                <div class="circuit c3"></div>
              </div>
            </div>
          </div>
          <!-- Side faces -->
          <div class="head-face head-left"></div>
          <div class="head-face head-right"></div>
          <div class="head-face head-top"></div>
          <div class="head-face head-bottom"></div>
        </div>
      </div>
      <div class="intro-text">
        <span class="intro-label">Popopen</span>
        <span class="intro-sub">Skills Manager</span>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-shell" class="app-hidden">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-nav">
          <div class="brand">
            <div class="brand-icon">
              <img src="/logo.png" alt="Popopen" width="20" height="20">
            </div>
            <h1>Popopen</h1>
          </div>
          <div class="nav-buttons">
            <button class="nav-btn" id="btn-collapse-all" title="Collapse all">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2 5h12v1.5H2zM2 9.5h12V11H2z"/></svg>
            </button>
            <button class="nav-btn" data-view="dashboard" title="Dashboard">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
            </button>
          </div>
        </div>
        <div id="search-container"></div>
      </div>
      <div id="skill-tree"></div>
      <div class="sidebar-footer">
        <span class="footer-pulse"></span>
        <span class="footer-text">Connected</span>
        <a class="help-btn" href="https://github.com/mriziq/popopen" target="_blank" rel="noopener" title="View on GitHub">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
        <button class="help-btn" id="help-btn" title="Start tour">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm.75 10.5h-1.5v-1.5h1.5v1.5zm1.27-4.94c-.3.44-.7.77-1.22 1.02-.3.14-.5.3-.6.47a1.3 1.3 0 00-.15.62H6.55c0-.38.07-.7.2-.96.14-.26.4-.5.78-.73.36-.22.6-.43.73-.62.13-.2.2-.42.2-.67 0-.28-.09-.5-.27-.66-.18-.16-.43-.24-.75-.24-.3 0-.55.08-.74.25-.19.17-.3.4-.34.7H4.7c.05-.6.28-1.07.7-1.4.41-.34.96-.5 1.65-.5.72 0 1.28.18 1.7.52.4.35.6.82.6 1.4 0 .37-.14.72-.43 1.06z"/>
          </svg>
        </button>
        <div class="theme-toggle" id="theme-toggle">
          <button class="theme-btn" data-theme-value="light" title="Light">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
              <circle cx="8" cy="8" r="3"/>
              <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            </svg>
          </button>
          <button class="theme-btn" data-theme-value="system" title="System">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 1.5A5.5 5.5 0 018 14V2.5z"/>
            </svg>
          </button>
          <button class="theme-btn" data-theme-value="dark" title="Dark">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
              <path d="M12.3 10.9a6 6 0 01-7.2-7.2 5 5 0 107.2 7.2z"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>
    <main id="content">
      <div id="welcome">
        <div class="welcome-inner">
          <div class="welcome-icon">
            <img src="/logo.png" alt="Popopen" width="64" height="64">
          </div>
          <h2>Skills Manager</h2>
          <p>Select a skill from the sidebar to view and edit its configuration.</p>
          <div class="welcome-hint">
            <kbd>&#8984;K</kbd> to search &middot; <span class="hint-link" data-view="dashboard">open dashboard</span>
          </div>
        </div>
      </div>
      <div id="file-header" class="hidden">
        <div id="file-meta"></div>
        <div id="file-actions">
          <button id="btn-frontmatter" class="btn hidden">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h5v5H2zM9 2h5v5H9zM2 9h5v5H2zM11 10v4M9 12h4"/></svg>
            Edit Details
          </button>
          <button id="btn-edit" class="btn">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 1.5l3 3L5 14H2v-3z"/></svg>
            Edit Skill
          </button>
          <button id="btn-uninstall" class="btn btn-danger hidden" title="Uninstall this skill">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 016 6v6a.5.5 0 01-1 0V6a.5.5 0 01.5-.5zm2.5 0a.5.5 0 01.5.5v6a.5.5 0 01-1 0V6a.5.5 0 01.5-.5zm3 .5a.5.5 0 00-1 0v6a.5.5 0 001 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 01-1 1H13v9a2 2 0 01-2 2H5a2 2 0 01-2-2V4h-.5a1 1 0 01-1-1V2a1 1 0 011-1H6a1 1 0 011-1h2a1 1 0 011 1h3.5a1 1 0 011 1v1zM4.118 4L4 4.059V13a1 1 0 001 1h6a1 1 0 001-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
            Uninstall
          </button>
          <button id="btn-save" class="btn btn-primary hidden">Save</button>
          <button id="btn-cancel" class="btn hidden">Cancel</button>
        </div>
      </div>
      <div id="viewer-tabs" class="hidden">
        <button class="tab active" data-tab="content">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h12v2H2zM2 6h8v2H2zM2 10h10v2H2zM2 14h6v2H2z"/></svg>
          Content
        </button>
        <button class="tab" data-tab="permissions">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1L2 4v4c0 4 2.5 6 6 7 3.5-1 6-3 6-7V4z"/></svg>
          Permissions
        </button>
      </div>
      <div id="viewer" class="hidden"></div>
      <div id="editor-container" class="hidden"></div>
      <div id="dashboard-view" class="hidden"></div>
      <div id="frontmatter-editor" class="hidden"></div>
      <div id="diff-view" class="hidden"></div>
      <div id="permissions-view" class="hidden"></div>
    </main>
  </div>

  <script src="/js/theme.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/viewer.js"></script>
  <script src="/js/editor.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/frontmatter-editor.js"></script>
  <script src="/js/diff-viewer.js"></script>
  <script src="/js/permissions.js"></script>
  <script src="/js/bulk.js"></script>
  <script src="/js/app.js"></script>
  <script type="module" src="/js/tour.js"></script>
</body>
</html>
